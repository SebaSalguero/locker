<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>LOCKER | Tienda Oficial</title>

  <link rel="stylesheet" href="css/styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>


  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="container">
      <h1 class="logo"></h1>
      
      <p class="subtitle"></p>

      <div class="header-main">

          <!-- IZQUIERDA -->
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>

          <!-- CENTRO -->
        <div class="logo-mobile">LOCKER</div>

          <!-- DERECHA -->
        <div class="header-right">
          <div id="userBar"></div>
          <div class="login-icon" onclick="showLogin()">👤</div>
          <div class="cart-icon cart-button" onclick="openCart()">
          🛒 <span id="cartCount">0</span>
          </div>
        </div>

      </div>

        <!-- BUSCADOR ABAJO (IMPORTANTE) -->

        
      

      
      <div class="search-input">
        
        <input
          
          type="text"
          id="searchInput"
          name="search_random_987"
          placeholder="Buscar productos..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        >
        <div id="suggestions" class="suggestions-box"></div>
      </div>
      
    </div>

    <div class="header-actions">

    </div>
    
  </header>

  <nav id="categoriesNav" class="categories"></nav>

  <!-- MENÚ HAMBURGUESA -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <span>Menú</span>
    <button onclick="toggleMenu()">✕</button>
  </div>

  <button onclick="filterCategory('all')">Todos</button>

  <div id="menuCategories"></div>

</div>

<div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>


  <!-- ===== PRODUCTOS ===== -->
  <main class="container">
    <h2>Productos</h2>
    
    <div id="products" class="products-grid"></div>
  </main>


  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>© 2026 LOCKER · Tienda oficial</p>
  </footer>


<!-- LOGIN -->
<div id="login">
  <div class="login-box" onclick="event.stopPropagation()">
    <h2>Iniciar sesión</h2>

    <input id="username" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
    <button onclick="showLogin()">Cancelar</button>
    <button onclick="openRegister()">Registrarse</button>
  </div>
</div>

<!-- REGISTER -->
<div id="register">
  <div class="login-box" onclick="event.stopPropagation()">
    <h2>Crear cuenta</h2>

    <input id="regNombre" placeholder="Nombre">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password" placeholder="Contraseña">


    <button onclick="register()">Registrarse</button>
    <button onclick="closeRegister()">Cancelar</button>
  </div>
</div>


<!-- CARRITO LATERAL -->
<div id="cartPanel" class="cart-panel">

  <div class="cart-header">
    <h3>Tu carrito</h3>
    <button onclick="toggleCart()">✕</button>
  </div>

  <div id="cartItemsPanel" class="cart-items"></div>

  <div class="cart-footer">
    <button onclick="sendOrder()">Finalizar por WhatsApp</button>
  </div>

</div>
  <div id="toast" class="toast"></div>
  <!-- JS SIEMPRE AL FINAL -->
  <script src="js/app.js"></script>
  
</body>
</html>
